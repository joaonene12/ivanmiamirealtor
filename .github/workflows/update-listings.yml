name: Update Listings

on:
  schedule:
    - cron: '0 8 1 * *'  # 1st of month, 8 AM UTC
  workflow_dispatch:      # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest listings
        run: node update-listings.mjs

      - name: Commit updated listings
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh listings"
          file_pattern: listings.json
